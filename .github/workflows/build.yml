name: Build APKs

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Inject tokens
        env:
          GPT_TOKEN: ${{ secrets.GPT_TOKEN }}
        run: |
          sed -i "s|var githubToken: String = \".*\"|var githubToken: String = \"${GPT_TOKEN}\"|" cornell_project/app/src/main/java/com/example/cornell/api/GptRepository.kt
          echo "${GPT_TOKEN}" > resolvedor_fix/app/src/main/assets/github_token.txt
          echo "${GPT_TOKEN}" > imagenes_fix/app/src/main/assets/github_token.txt
          echo "${GPT_TOKEN}" > mathsnip/app/src/main/assets/gpt_token.txt

      - name: Build cornell_project
        run: cd cornell_project && chmod +x gradlew && ./gradlew assembleDebug

      - name: Build resolvedor_fix
        run: cd resolvedor_fix && chmod +x gradlew && ./gradlew assembleDebug

      - name: Build imagenes_fix
        run: cd imagenes_fix && chmod +x gradlew && ./gradlew assembleDebug

      - name: Build mathsnip
        run: cd mathsnip && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: |
            cornell_project/app/build/outputs/apk/debug/app-debug.apk
            resolvedor_fix/app/build/outputs/apk/debug/app-debug.apk
            imagenes_fix/app/build/outputs/apk/debug/app-debug.apk
            mathsnip/app/build/outputs/apk/debug/app-debug.apk
